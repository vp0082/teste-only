<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App - Teste 2</title>
    <!-- Carregando React via CDN para garantir que o JS chegue ao navegador -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.294.0/lucide.min.js"></script>
  </head>
  <body class="bg-slate-950 text-slate-50 font-sans">
    <div id="error-display" class="fixed top-0 left-0 w-full bg-red-600 text-white p-2 z-[9999] hidden font-mono text-xs"></div>
    <div id="root">
      <div class="min-h-screen flex items-center justify-center bg-black font-mono overflow-hidden relative">
        <!-- Matrix-like background effect -->
        <div class="absolute inset-0 opacity-20 pointer-events-none">
          <div class="h-full w-full bg-[linear-gradient(rgba(16,185,129,0.1)_50%,transparent_50%)] bg-[length:100%_4px]"></div>
        </div>

        <div class="text-center relative z-10 p-8">
          <div class="relative w-24 h-24 mx-auto mb-8">
            <div class="absolute inset-0 border-4 border-emerald-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-emerald-500 rounded-full border-t-transparent animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
            </div>
          </div>
          
          <div class="space-y-4">
            <h2 class="text-2xl font-black text-white uppercase tracking-[0.3em] animate-pulse">Iniciando Minerador</h2>
            <div class="flex flex-col items-center gap-2">
              <div class="text-[10px] text-emerald-500/60 uppercase tracking-widest flex items-center gap-2">
                <span class="inline-block w-1 h-1 bg-emerald-500 rounded-full"></span>
                Sincronizando com a Blockchain
              </div>
              <div class="w-48 h-1 bg-zinc-900 rounded-full overflow-hidden border border-zinc-800">
                <div class="h-full bg-emerald-500 w-1/3 animate-[loading_2s_ease-in-out_infinite]"></div>
              </div>
            </div>
            <p class="text-[9px] text-zinc-600 uppercase tracking-widest mt-8">Estabelecendo Conexão Segura com o Nó...</p>
          </div>
        </div>
      </div>
    </div>

    <style>
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }
      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideOut {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
      }
      @keyframes popValue {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); color: #10b981; }
        100% { transform: scale(1); }
      }
      .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }
      .animate-slide-out { animation: slideOut 0.5s ease-in forwards; }
      .animate-pop { animation: popValue 0.4s ease-out; }
    </style>

    <script>
      window.onerror = function(msg, url, line, col, error) {
        var display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = 'ERRO: ' + msg + ' (Linha: ' + line + ')';
        return false;
      };
    </script>

    <script type="text/babel">
      const { useState, useEffect, useRef, Component } = React;

      // Error Boundary deve ser uma Class Component no React
      class ErrorBoundary extends Component {
        constructor(props) {
          super(props);
          this.state = { hasError: false, error: null };
        }
        static getDerivedStateFromError(error) {
          return { hasError: true, error };
        }
        componentDidCatch(error, errorInfo) {
          console.error("Erro capturado:", error, errorInfo);
        }
        render() {
          if (this.state.hasError) {
            return (
              <div style={{ padding: '20px', background: '#450a0a', color: 'white', fontFamily: 'monospace' }}>
                <h1>Erro de Renderização</h1>
                <pre>{this.state.error?.message}</pre>
                <button onClick={() => window.location.reload()}>Recarregar</button>
              </div>
            );
          }
          return this.props.children;
        }
      }

      const Countdown = () => {
        const [timeLeft, setTimeLeft] = useState({ minutes: 14, seconds: 59 });

        useEffect(() => {
          const timer = setInterval(() => {
            setTimeLeft(prev => {
              if (prev.minutes === 0 && prev.seconds === 0) {
                clearInterval(timer);
                return prev;
              }
              if (prev.seconds === 0) {
                return { minutes: prev.minutes - 1, seconds: 59 };
              }
              return { ...prev, seconds: prev.seconds - 1 };
            });
          }, 1000);
          return () => clearInterval(timer);
        }, []);

        return (
          <div className="flex items-center gap-2 bg-orange-100 text-orange-600 px-4 py-2 rounded-full font-black text-sm animate-pulse">
            <i data-lucide="timer" className="w-4 h-4"></i>
            <span>OFERTA TERMINA EM: {String(timeLeft.minutes).padStart(2, '0')}:{String(timeLeft.seconds).padStart(2, '0')}</span>
          </div>
        );
      };

      const App = () => {
        const [currentStep, setCurrentStep] = useState('profile'); // profile, qrcode
        const [selectedPrice, setSelectedPrice] = useState('9,90');

        useEffect(() => {
          const timer = setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
          }, 100);
          return () => clearTimeout(timer);
        }, [currentStep]);

        const handleSelectPlan = (price) => {
          setSelectedPrice(price);
          setCurrentStep('qrcode');
        };

        // Renderização baseada no passo atual
        if (currentStep === 'profile') {
          return (
            <div className="min-h-screen bg-white text-zinc-900 font-sans flex flex-col items-center pb-20">
              {/* Banner / Header */}
              <div className="w-full h-48 bg-gradient-to-b from-orange-100 to-white relative overflow-hidden">
                <img 
                  src="https://picsum.photos/seed/duda-banner/1200/400?blur=5" 
                  className="w-full h-full object-cover opacity-60"
                  alt="Banner"
                  referrerPolicy="no-referrer"
                />
              </div>

              <div className="w-full max-w-md -mt-16 px-6 flex flex-col items-center relative z-10">
                {/* Foto de Perfil */}
                <div className="relative mb-4">
                  <div className="w-32 h-32 rounded-full border-4 border-white p-1 bg-gradient-to-tr from-orange-500 to-yellow-500 shadow-xl">
                    <img 
                      src="https://picsum.photos/seed/eduarda-ofc/300/300" 
                      alt="Eduarda Oficial" 
                      className="w-full h-full rounded-full object-cover border-2 border-white"
                      referrerPolicy="no-referrer"
                    />
                  </div>
                  <div className="absolute bottom-1 right-1 bg-orange-500 p-1.5 rounded-full border-2 border-white">
                    <i data-lucide="check" className="w-3 h-3 text-white font-bold"></i>
                  </div>
                </div>

                {/* Nome e Handle */}
                <h1 className="text-2xl font-black tracking-tight mb-0.5 text-zinc-900">Eduarda Oficial 💋</h1>
                <p className="text-orange-600 text-sm font-medium mb-6">@eduardaoficial1_</p>

                {/* Contador de Promoção */}
                <div className="mb-8">
                  <Countdown />
                </div>

                {/* Media Counts */}
                <div className="flex gap-8 mb-8 bg-zinc-50 p-4 rounded-2xl w-full justify-center border border-zinc-100">
                  <div className="text-center">
                    <div className="text-lg font-black text-zinc-900">124</div>
                    <div className="text-[10px] text-zinc-400 uppercase tracking-widest">Fotos</div>
                  </div>
                  <div className="text-center">
                    <div className="text-lg font-black text-zinc-900">42</div>
                    <div className="text-[10px] text-zinc-400 uppercase tracking-widest">Vídeos</div>
                  </div>
                  <div className="text-center">
                    <div className="text-lg font-black text-zinc-900">18.4k</div>
                    <div className="text-[10px] text-zinc-400 uppercase tracking-widest">Likes</div>
                  </div>
                </div>

                {/* Descrição */}
                <p className="text-zinc-500 text-center text-[13px] leading-relaxed mb-8 px-2">
                  Oi, meu amor! 🔥💦 Sou a Duda, e hoje vou revelar um lado meu que vai te deixar sem fôlego… vídeos gozando com meus ficantes, trisal com amigas safadas e momentos íntimos onde me entrego de corpo e alma. 😏 Cada centímetro do meu corpo é pura tentação e minhas fotos peladas são um convite exclusivo para você explorar seus desejos mais secretos tudo sem censura! Se você tem coragem de se perder nessa paixão sem limites, vem comigo... Estou te esperando para uma experiência única e irresistível.😈💋
                </p>

                {/* Grid de 6 Fotos Bloqueadas */}
                <div className="grid grid-cols-3 gap-3 w-full mb-10">
                  {[1, 2, 3, 4, 5, 6].map((i) => (
                    <div key={i} className="aspect-square bg-zinc-100 rounded-xl relative overflow-hidden group cursor-pointer border border-zinc-200" onClick={() => handleSelectPlan('9,90')}>
                      <img 
                        src={`https://picsum.photos/seed/locked-${i}/300/300?blur=10`} 
                        alt="Locked content" 
                        className="w-full h-full object-cover opacity-40"
                        referrerPolicy="no-referrer"
                      />
                      <div className="absolute inset-0 flex items-center justify-center">
                        <div className="bg-white/80 backdrop-blur-sm p-3 rounded-full border border-zinc-200 shadow-sm">
                          <i data-lucide="lock" className="w-6 h-6 text-orange-500"></i>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>

                {/* Seção de Assinaturas */}
                <div className="w-full space-y-4 mb-8">
                  <h3 className="text-xs uppercase font-bold text-zinc-400 tracking-widest mb-4 text-center">Planos de Assinatura</h3>
                  
                  {/* Plano 30 Dias - Mais Popular */}
                  <div className="relative group cursor-pointer" onClick={() => handleSelectPlan('9,90')}>
                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-orange-600 text-[9px] font-black text-white px-3 py-1 rounded-full uppercase tracking-widest z-20">
                      Mais Popular 🔥🔥
                    </div>
                    <div className="bg-white border-2 border-orange-500/30 p-5 rounded-2xl flex justify-between items-center hover:border-orange-500 transition-all shadow-sm">
                      <div>
                        <div className="text-sm font-bold text-zinc-900">30 DIAS</div>
                        <div className="text-[10px] text-zinc-400 uppercase">+ CHAMADA DE VÍDEO COMIGO HOJE!</div>
                      </div>
                      <div className="text-xl font-black text-orange-600">R$ 9,90</div>
                    </div>
                  </div>

                  {/* Plano 3 Meses */}
                  <div className="bg-zinc-50 border border-zinc-200 p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:border-orange-300 transition-all" onClick={() => handleSelectPlan('14,90')}>
                    <div className="flex items-center gap-3">
                      <div className="bg-zinc-200 p-2 rounded-lg text-[10px] font-bold text-zinc-500 uppercase">Economia</div>
                      <div className="text-sm font-bold text-zinc-900">3 MESES</div>
                    </div>
                    <div className="text-xl font-black text-zinc-900">R$ 14,90</div>
                  </div>

                  {/* Plano 1 Ano */}
                  <div className="bg-zinc-50 border border-zinc-200 p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:border-orange-300 transition-all" onClick={() => handleSelectPlan('29,90')}>
                    <div className="flex items-center gap-3">
                      <div className="bg-orange-100 p-2 rounded-lg text-[10px] font-bold text-orange-600 uppercase">Melhor Oferta</div>
                      <div className="text-sm font-bold text-zinc-900">1 ANO</div>
                    </div>
                    <div className="text-xl font-black text-zinc-900">R$ 29,90</div>
                  </div>
                </div>

                {/* Botão de Ação Principal */}
                <button 
                  onClick={() => handleSelectPlan('9,90')}
                  className="w-full py-5 bg-orange-600 hover:bg-orange-500 text-white font-black rounded-2xl uppercase tracking-[0.1em] transition-all shadow-xl shadow-orange-600/20 flex items-center justify-center gap-3 mb-10"
                >
                  VEJA TUDO POR APENAS R$ 9,90
                </button>

                {/* Footer Links */}
                <div className="flex gap-6 mb-8">
                  <a href="#" className="text-[10px] text-zinc-400 uppercase hover:text-zinc-600 transition-all">Termos de Uso</a>
                  <a href="#" className="text-[10px] text-zinc-400 uppercase hover:text-zinc-600 transition-all">Política de Privacidade</a>
                </div>
                
                <p className="text-[9px] text-zinc-400 uppercase tracking-widest text-center">
                  © 2024 Eduarda Oficial. Todos os direitos reservados.
                </p>
              </div>
            </div>
          );
        }

        if (currentStep === 'qrcode') {
          return (
            <div className="min-h-screen bg-zinc-50 text-zinc-900 font-sans p-4 flex flex-col items-center justify-center">
              <div className="w-full max-w-md bg-white p-8 rounded-3xl text-center text-zinc-900 shadow-2xl border border-zinc-100">
                <div className="flex items-center justify-center gap-2 mb-6">
                  <img src="https://logospng.org/download/pix/logo-pix-icone-512.png" className="h-6" alt="PIX" />
                  <span className="font-black uppercase tracking-tighter text-sm text-zinc-900">Pagamento via PIX</span>
                </div>

                <div className="bg-zinc-50 p-4 rounded-2xl mb-6 border border-zinc-100">
                  <img 
                    src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=00020126330014br.gov.bcb.pix0111000000000005204000053039865404${selectedPrice.replace(',', '.')}.005802BR5913EduardaOfc6009SAO%20PAULO62070503***6304`} 
                    className="w-full aspect-square rounded-lg shadow-sm"
                    alt="QR Code PIX"
                  />
                </div>

                <div className="space-y-4">
                  <div className="text-left bg-orange-50 p-4 rounded-xl border border-orange-100">
                    <div className="text-[10px] text-orange-400 uppercase font-bold">Valor a pagar</div>
                    <div className="text-xl font-black text-orange-600">R$ {selectedPrice}</div>
                  </div>

                  <p className="text-[10px] text-zinc-400 uppercase leading-tight">
                    Escaneie o código acima com o app do seu banco. <br />
                    O acesso será liberado automaticamente após a confirmação.
                  </p>

                  <div className="pt-4 border-t border-zinc-100">
                    <button 
                      onClick={() => alert("Chave PIX Copia e Cola copiada!")}
                      className="w-full py-3 bg-zinc-900 text-white text-xs font-bold rounded-xl uppercase tracking-widest hover:bg-zinc-800 transition-all"
                    >
                      Copiar Código PIX
                    </button>
                  </div>
                </div>
              </div>
              <button 
                onClick={() => setCurrentStep('profile')}
                className="mt-8 text-[10px] text-zinc-400 uppercase hover:text-zinc-600 transition-all font-bold"
              >
                Cancelar e Voltar
              </button>
            </div>
          );
        }

        return null;
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <ErrorBoundary>
          <App />
        </ErrorBoundary>
      );
      
      const initIcons = () => {
        if (window.lucide) {
          window.lucide.createIcons();
        } else {
          setTimeout(initIcons, 100);
        }
      };
      initIcons();
    </script>




  </body>
</html>
